name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-preflight:
    name: Windows preflight
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run backend tests
        shell: pwsh
        run: |
          node --version
          npm test

      - name: Run Windows preflight checks
        shell: pwsh
        run: .\scripts\Preflight-Windows.ps1 -SkipZip

  build-and-test:
    name: Build and test IdeaSpark
    runs-on: macos-latest
    needs: windows-preflight
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare result directory
        run: mkdir -p TestResults

      - name: Select available iPhone simulator
        run: |
          xcrun simctl list devices available --json > simulators.json
          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          with open("simulators.json", encoding="utf-8") as simulator_file:
              data = json.load(simulator_file)

          preferred_names = ["iPhone 16", "iPhone 15", "iPhone 14"]
          devices = []

          for runtime, runtime_devices in data.get("devices", {}).items():
              version_match = re.search(r"iOS-(\d+)(?:-|$)", runtime)
              if version_match is None:
                  continue

              runtime_major = int(version_match.group(1))
              if runtime_major < 17:
                  continue

              for device in runtime_devices:
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone"):
                      devices.append({
                          **device,
                          "runtime": runtime,
                          "runtimeMajor": runtime_major,
                      })

          selected = None
          for runtime_major in [17] + sorted(
              {device["runtimeMajor"] for device in devices if device["runtimeMajor"] != 17}
          ):
              runtime_devices = [
                  device for device in devices
                  if device["runtimeMajor"] == runtime_major
              ]
              for preferred_name in preferred_names:
                  selected = next(
                      (device for device in runtime_devices if device.get("name") == preferred_name),
                      None
                  )
                  if selected is not None:
                      break
              if selected is None and runtime_devices:
                  selected = runtime_devices[0]
              if selected is not None:
                  break

          if selected is None:
              sys.exit("No available iPhone simulator running iOS 17 or newer found on this runner.")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"SIMULATOR_ID={selected['udid']}\n")
              env_file.write(f"SIMULATOR_NAME={selected['name']}\n")
              env_file.write(f"SIMULATOR_RUNTIME={selected['runtime']}\n")

          print(f"Selected {selected['name']} ({selected['udid']}) on {selected['runtime']}")
          PY

      - name: Build for simulator
        run: |
          set +e
          set -o pipefail
          xcodebuild build \
            -project IdeaSpark.xcodeproj \
            -scheme IdeaSpark \
            -configuration Debug \
            -destination "id=${SIMULATOR_ID}" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee TestResults/build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
          python3 - <<'PY'
          from pathlib import Path

          log = Path("TestResults/build.log").read_text(errors="replace")
          interesting = [
              line for line in log.splitlines()
              if "error:" in line.lower()
              or "build failed" in line.lower()
              or "xcodebuild:" in line.lower()
              or "failed" in line.lower()
          ]
          summary = "\n".join(interesting[-25:] or log.splitlines()[-80:])
          summary = summary.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Xcode build failed::{summary}")
          PY
            exit "$status"
          fi

      - name: Run tests
        run: |
          set +e
          set -o pipefail
          xcodebuild test \
            -project IdeaSpark.xcodeproj \
            -scheme IdeaSpark \
            -configuration Debug \
            -destination "id=${SIMULATOR_ID}" \
            -resultBundlePath TestResults/IdeaSpark.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee TestResults/test.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
          python3 - <<'PY'
          from pathlib import Path

          log = Path("TestResults/test.log").read_text(errors="replace")
          interesting = [
              line for line in log.splitlines()
              if "error:" in line.lower()
              or "test failed" in line.lower()
              or "failed" in line.lower()
              or "xcodebuild:" in line.lower()
          ]
          summary = "\n".join(interesting[-25:] or log.splitlines()[-80:])
          summary = summary.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Xcode tests failed::{summary}")
          PY
            exit "$status"
          fi
      - name: Build unsigned iPhone app
        run: |
          rm -rf DeviceBuild Payload IdeaSpark-unsigned.ipa

          xcodebuild build \
            -project IdeaSpark.xcodeproj \
            -scheme IdeaSpark \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath DeviceBuild \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.janszala619.ideaspak

      - name: Create unsigned IPA
        run: |
          mkdir -p Payload

          cp -R \
            DeviceBuild/Build/Products/Release-iphoneos/IdeaSpark.app \
            Payload/IdeaSpark.app

          zip -qry IdeaSpark-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: IdeaSpark-unsigned-ipa
          path: IdeaSpark-unsigned.ipa
          if-no-files-found: error
      - name: Upload build and test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: IdeaSpark-ci-results
          path: TestResults
          if-no-files-found: ignore
